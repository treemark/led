<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 820" width="1100" height="820" font-family="monospace" font-size="11">

  <!-- Background -->
  <rect width="1100" height="820" fill="#1a1a2e" rx="8"/>

  <!-- Title -->
  <text x="550" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="bold">LED2 Teensy Wiring Diagram</text>
  <text x="550" y="48" text-anchor="middle" fill="#888" font-size="10">Round Glass-Pebble Interactive Table</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- TEENSY 4.0 (center) -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="400" y="280" width="160" height="220" fill="#2d4a22" stroke="#6abf45" stroke-width="2" rx="4"/>
  <text x="480" y="298" text-anchor="middle" fill="#6abf45" font-weight="bold" font-size="12">TEENSY 4.0</text>
  <!-- Left pins -->
  <text x="408" y="320" fill="#aaa" font-size="9">A0 ●</text>
  <text x="408" y="335" fill="#aaa" font-size="9">A1 ●</text>
  <text x="408" y="350" fill="#aaa" font-size="9">A2 ●</text>
  <text x="408" y="365" fill="#aaa" font-size="9">A3 ●</text>
  <text x="408" y="380" fill="#aaa" font-size="9">A4 ●</text>
  <text x="408" y="430" fill="#aaa" font-size="9">TX1 ●</text>
  <text x="408" y="445" fill="#aaa" font-size="9">RX1 ●</text>
  <text x="408" y="470" fill="#aaa" font-size="9">3V3 ●</text>
  <text x="408" y="485" fill="#aaa" font-size="9">GND ●</text>
  <!-- Right pins -->
  <text x="508" y="320" fill="#aaa" font-size="9">● D2</text>
  <text x="508" y="335" fill="#aaa" font-size="9">● D3</text>
  <text x="508" y="350" fill="#aaa" font-size="9">● D4</text>
  <text x="508" y="395" fill="#aaa" font-size="9">● 5V</text>
  <text x="508" y="410" fill="#aaa" font-size="9">● GND</text>
  <!-- Pin dots left -->
  <circle cx="402" cy="317" r="3" fill="#6abf45"/>
  <circle cx="402" cy="332" r="3" fill="#6abf45"/>
  <circle cx="402" cy="347" r="3" fill="#6abf45"/>
  <circle cx="402" cy="362" r="3" fill="#6abf45"/>
  <circle cx="402" cy="377" r="3" fill="#6abf45"/>
  <circle cx="402" cy="427" r="3" fill="#e8a020"/>
  <circle cx="402" cy="442" r="3" fill="#e8a020"/>
  <circle cx="402" cy="467" r="3" fill="#e05050"/>
  <circle cx="402" cy="482" r="3" fill="#555"/>
  <!-- Pin dots right -->
  <circle cx="558" cy="317" r="3" fill="#4aa8e0"/>
  <circle cx="558" cy="332" r="3" fill="#4aa8e0"/>
  <circle cx="558" cy="347" r="3" fill="#4aa8e0"/>
  <circle cx="558" cy="392" r="3" fill="#e05050"/>
  <circle cx="558" cy="407" r="3" fill="#555"/>

  <!-- Audio shield label inside Teensy box -->
  <rect x="415" y="455" width="130" height="22" fill="#1a3a10" stroke="#6abf45" stroke-width="1" rx="2"/>
  <text x="480" y="469" text-anchor="middle" fill="#aaffaa" font-size="9">Audio Shield Rev D2</text>
  <text x="480" y="478" text-anchor="middle" fill="#888" font-size="8">(stacked on Teensy)</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- PIEZO SENSORS (top-left area) -->
  <!-- ═══════════════════════════════════════════════════ -->
  <text x="30" y="75" fill="#e0e0e0" font-size="12" font-weight="bold">PIEZO SENSORS</text>
  <text x="30" y="88" fill="#888" font-size="9">CPT-2746-L100 × 4</text>
  <text x="30" y="99" fill="#888" font-size="9">(+ 2 for rim, 2 spare)</text>

  <!-- Piezo 1 -->
  <ellipse cx="80" cy="140" rx="28" ry="14" fill="#3a2a10" stroke="#c8a040" stroke-width="2"/>
  <text x="80" y="144" text-anchor="middle" fill="#c8a040" font-size="9">P1 45°</text>
  <!-- Piezo 2 -->
  <ellipse cx="160" cy="140" rx="28" ry="14" fill="#3a2a10" stroke="#c8a040" stroke-width="2"/>
  <text x="160" y="144" text-anchor="middle" fill="#c8a040" font-size="9">P2 135°</text>
  <!-- Piezo 3 -->
  <ellipse cx="80" cy="185" rx="28" ry="14" fill="#3a2a10" stroke="#c8a040" stroke-width="2"/>
  <text x="80" y="189" text-anchor="middle" fill="#c8a040" font-size="9">P3 225°</text>
  <!-- Piezo 4 -->
  <ellipse cx="160" cy="185" rx="28" ry="14" fill="#3a2a10" stroke="#c8a040" stroke-width="2"/>
  <text x="160" y="189" text-anchor="middle" fill="#c8a040" font-size="9">P4 315°</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- JFET BUFFER BOARD (left middle) -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="30" y="240" width="160" height="130" fill="#1a2a3a" stroke="#4aa8e0" stroke-width="2" rx="4"/>
  <text x="110" y="258" text-anchor="middle" fill="#4aa8e0" font-size="11" font-weight="bold">JFET BUFFERS</text>
  <text x="110" y="270" text-anchor="middle" fill="#888" font-size="9">2N5484 × 5</text>

  <!-- 4 piezo channels -->
  <text x="40" y="290" fill="#aaa" font-size="9">CH1 [P1]</text>
  <rect x="90" y="282" width="40" height="12" fill="#0d2030" stroke="#4aa8e0" stroke-width="1" rx="2"/>
  <text x="110" y="291" text-anchor="middle" fill="#4aa8e0" font-size="8">Q1</text>
  <text x="140" y="290" fill="#aaa" font-size="9">→ A0</text>

  <text x="40" y="308" fill="#aaa" font-size="9">CH2 [P2]</text>
  <rect x="90" y="300" width="40" height="12" fill="#0d2030" stroke="#4aa8e0" stroke-width="1" rx="2"/>
  <text x="110" y="309" text-anchor="middle" fill="#4aa8e0" font-size="8">Q2</text>
  <text x="140" y="308" fill="#aaa" font-size="9">→ A1</text>

  <text x="40" y="326" fill="#aaa" font-size="9">CH3 [P3]</text>
  <rect x="90" y="318" width="40" height="12" fill="#0d2030" stroke="#4aa8e0" stroke-width="1" rx="2"/>
  <text x="110" y="327" text-anchor="middle" fill="#4aa8e0" font-size="8">Q3</text>
  <text x="140" y="326" fill="#aaa" font-size="9">→ A2</text>

  <text x="40" y="344" fill="#aaa" font-size="9">CH4 [P4]</text>
  <rect x="90" y="336" width="40" height="12" fill="#0d2030" stroke="#4aa8e0" stroke-width="1" rx="2"/>
  <text x="110" y="345" text-anchor="middle" fill="#4aa8e0" font-size="8">Q4</text>
  <text x="140" y="344" fill="#aaa" font-size="9">→ A3</text>

  <!-- Rim channel -->
  <text x="40" y="362" fill="#e0a0d0" font-size="9">RIM</text>
  <rect x="90" y="354" width="40" height="12" fill="#0d2030" stroke="#4aa8e0" stroke-width="1" rx="2"/>
  <text x="110" y="363" text-anchor="middle" fill="#4aa8e0" font-size="8">Q5</text>
  <text x="140" y="362" fill="#aaa" font-size="9">→ A4</text>

  <!-- 10MΩ / 100nF note -->
  <text x="40" y="378" fill="#666" font-size="8">10MΩ gate bias, 100nF decoupling</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- RIM RESISTIVE SENSOR (bottom-left) -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="30" y="560" width="160" height="60" fill="#2a1a30" stroke="#c050c0" stroke-width="2" rx="4"/>
  <text x="110" y="578" text-anchor="middle" fill="#c050c0" font-size="11" font-weight="bold">ALUMINUM RIM</text>
  <text x="110" y="591" text-anchor="middle" fill="#888" font-size="9">Resistive position divider</text>
  <text x="110" y="602" text-anchor="middle" fill="#888" font-size="9">3V3 ── Rfilm ── GND</text>
  <text x="110" y="613" text-anchor="middle" fill="#888" font-size="9">touch tap → voltage → JFET Q5</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- LED STRIPS (right side) -->
  <!-- ═══════════════════════════════════════════════════ -->
  <text x="700" y="75" fill="#e0e0e0" font-size="12" font-weight="bold">LED STRIPS (existing)</text>
  <text x="700" y="88" fill="#888" font-size="9">900 px total · 3 × 300 px WS2812B</text>

  <rect x="700" y="100" width="160" height="40" fill="#1a1a3a" stroke="#4040c0" stroke-width="2" rx="4"/>
  <text x="780" y="118" text-anchor="middle" fill="#8080ff" font-size="10">Strip 1 · 300 px</text>
  <text x="700" y="152" fill="#888" font-size="9">DIN ←── D2</text>
  <text x="700" y="162" fill="#e05050" font-size="9">5V ←── 5V PSU</text>
  <text x="700" y="172" fill="#555" font-size="9">GND ←── GND</text>

  <rect x="700" y="185" width="160" height="40" fill="#1a1a3a" stroke="#4040c0" stroke-width="2" rx="4"/>
  <text x="780" y="203" text-anchor="middle" fill="#8080ff" font-size="10">Strip 2 · 300 px</text>
  <text x="700" y="237" fill="#888" font-size="9">DIN ←── D3</text>
  <text x="700" y="247" fill="#e05050" font-size="9">5V ←── 5V PSU</text>
  <text x="700" y="257" fill="#555" font-size="9">GND ←── GND</text>

  <rect x="700" y="270" width="160" height="40" fill="#1a1a3a" stroke="#4040c0" stroke-width="2" rx="4"/>
  <text x="780" y="288" text-anchor="middle" fill="#8080ff" font-size="10">Strip 3 · 300 px</text>
  <text x="700" y="322" fill="#888" font-size="9">DIN ←── D4</text>
  <text x="700" y="332" fill="#e05050" font-size="9">5V ←── 5V PSU</text>
  <text x="700" y="342" fill="#555" font-size="9">GND ←── GND</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- AUDIO OUTPUT (right-middle) -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="700" y="380" width="160" height="80" fill="#1a2a1a" stroke="#40c040" stroke-width="2" rx="4"/>
  <text x="780" y="398" text-anchor="middle" fill="#40c040" font-size="11" font-weight="bold">AUDIO AMP</text>
  <text x="780" y="410" text-anchor="middle" fill="#888" font-size="9">PAM8403 / MAX98357A</text>
  <text x="700" y="425" fill="#888" font-size="9">L/R IN ← Audio Shield 3.5mm</text>
  <text x="700" y="438" fill="#e05050" font-size="9">5V ←── 5V PSU</text>
  <text x="700" y="451" fill="#555" font-size="9">GND ←── GND</text>
  <text x="700" y="465" fill="#40c040" font-size="9">OUT → Speakers ×2</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- ESP32 (bottom-right) -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="700" y="540" width="160" height="90" fill="#2a1a1a" stroke="#e07030" stroke-width="2" rx="4"/>
  <text x="780" y="558" text-anchor="middle" fill="#e07030" font-size="11" font-weight="bold">ESP32</text>
  <text x="780" y="570" text-anchor="middle" fill="#888" font-size="9">(optional) Wi-Fi / MQTT</text>
  <text x="700" y="585" fill="#e8a020" font-size="9">RX ←── Teensy TX1</text>
  <text x="700" y="597" fill="#e8a020" font-size="9">TX ──→ Teensy RX1</text>
  <text x="700" y="609" fill="#e05050" font-size="9">3V3 or 5V ←── PSU</text>
  <text x="700" y="621" fill="#555" font-size="9">GND ←── GND</text>
  <text x="700" y="633" fill="#888" font-size="9">↕ Home Assistant / MQTT</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- POWER SUPPLY (bottom-center) -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="370" y="660" width="200" height="80" fill="#2a1010" stroke="#e05050" stroke-width="2" rx="4"/>
  <text x="470" y="678" text-anchor="middle" fill="#e05050" font-size="11" font-weight="bold">5V PSU</text>
  <text x="470" y="690" text-anchor="middle" fill="#888" font-size="9">Meanwell LRS-50-5 or equiv.</text>
  <text x="470" y="702" text-anchor="middle" fill="#888" font-size="9">10 A+ for LED strips</text>
  <text x="370" y="717" fill="#e05050" font-size="9">5V → Teensy VIN, LED strips, amp</text>
  <text x="370" y="729" fill="#aaa" font-size="9">3V3 regulated on Teensy → sensors</text>
  <text x="370" y="741" fill="#555" font-size="9">GND common throughout</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- WIRES -->
  <!-- ═══════════════════════════════════════════════════ -->

  <!-- Piezos → JFET buffer inputs -->
  <!-- P1 → CH1 -->
  <line x1="80" y1="154" x2="80" y2="225" stroke="#c8a040" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="80" y1="225" x2="90" y2="288" stroke="#c8a040" stroke-width="1.5" stroke-dasharray="4,2"/>
  <!-- P2 → CH2 -->
  <line x1="160" y1="154" x2="160" y2="235" stroke="#c8a040" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="160" y1="235" x2="90" y2="306" stroke="#c8a040" stroke-width="1.5" stroke-dasharray="4,2"/>
  <!-- P3 → CH3 -->
  <line x1="80" y1="199" x2="80" y2="240" stroke="#c8a040" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="80" y1="240" x2="90" y2="324" stroke="#c8a040" stroke-width="1.5" stroke-dasharray="4,2"/>
  <!-- P4 → CH4 -->
  <line x1="160" y1="199" x2="160" y2="242" stroke="#c8a040" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="160" y1="242" x2="90" y2="342" stroke="#c8a040" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Rim → JFET CH5 -->
  <line x1="110" y1="560" x2="110" y2="400" stroke="#c050c0" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="110" y1="400" x2="90" y2="360" stroke="#c050c0" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- JFET outputs → Teensy ADC pins -->
  <!-- CH1 → A0 -->
  <line x1="190" y1="288" x2="402" y2="317" stroke="#4aa8e0" stroke-width="1.5"/>
  <!-- CH2 → A1 -->
  <line x1="190" y1="306" x2="402" y2="332" stroke="#4aa8e0" stroke-width="1.5"/>
  <!-- CH3 → A2 -->
  <line x1="190" y1="324" x2="402" y2="347" stroke="#4aa8e0" stroke-width="1.5"/>
  <!-- CH4 → A3 -->
  <line x1="190" y1="342" x2="402" y2="362" stroke="#4aa8e0" stroke-width="1.5"/>
  <!-- CH5 → A4 -->
  <line x1="190" y1="360" x2="402" y2="377" stroke="#4aa8e0" stroke-width="1.5"/>

  <!-- Teensy D2/D3/D4 → LED strips -->
  <line x1="558" y1="317" x2="700" y2="120" stroke="#8080ff" stroke-width="1.5"/>
  <line x1="558" y1="332" x2="700" y2="205" stroke="#8080ff" stroke-width="1.5"/>
  <line x1="558" y1="347" x2="700" y2="290" stroke="#8080ff" stroke-width="1.5"/>

  <!-- Teensy TX1/RX1 → ESP32 -->
  <line x1="402" y1="427" x2="340" y2="427" stroke="#e8a020" stroke-width="1.5"/>
  <line x1="340" y1="427" x2="340" y2="585" stroke="#e8a020" stroke-width="1.5"/>
  <line x1="340" y1="585" x2="700" y2="585" stroke="#e8a020" stroke-width="1.5"/>
  <line x1="402" y1="442" x2="330" y2="442" stroke="#e8a020" stroke-width="1.5"/>
  <line x1="330" y1="442" x2="330" y2="597" stroke="#e8a020" stroke-width="1.5"/>
  <line x1="330" y1="597" x2="700" y2="597" stroke="#e8a020" stroke-width="1.5"/>

  <!-- Audio shield → Amp -->
  <line x1="558" y1="462" x2="640" y2="462" stroke="#40c040" stroke-width="1.5"/>
  <line x1="640" y1="462" x2="640" y2="425" stroke="#40c040" stroke-width="1.5"/>
  <line x1="640" y1="425" x2="700" y2="425" stroke="#40c040" stroke-width="1.5"/>

  <!-- PSU 5V → Teensy -->
  <line x1="470" y1="660" x2="470" y2="500" stroke="#e05050" stroke-width="1.5" stroke-dasharray="5,2"/>
  <line x1="470" y1="500" x2="558" y2="392" stroke="#e05050" stroke-width="1.5" stroke-dasharray="5,2"/>

  <!-- Teensy 3V3 → JFET board -->
  <line x1="402" y1="467" x2="190" y2="467" stroke="#e05050" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="190" y1="467" x2="190" y2="370" stroke="#e05050" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- LEGEND -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="860" y="80" width="220" height="185" fill="#111" stroke="#444" stroke-width="1" rx="4"/>
  <text x="970" y="98" text-anchor="middle" fill="#ccc" font-size="11" font-weight="bold">LEGEND</text>

  <line x1="875" y1="115" x2="910" y2="115" stroke="#c8a040" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="918" y="119" fill="#ccc" font-size="9">Piezo signal</text>

  <line x1="875" y1="132" x2="910" y2="132" stroke="#4aa8e0" stroke-width="1.5"/>
  <text x="918" y="136" fill="#ccc" font-size="9">ADC signal (buffered)</text>

  <line x1="875" y1="149" x2="910" y2="149" stroke="#8080ff" stroke-width="1.5"/>
  <text x="918" y="153" fill="#ccc" font-size="9">LED data (FastLED DMA)</text>

  <line x1="875" y1="166" x2="910" y2="166" stroke="#e8a020" stroke-width="1.5"/>
  <text x="918" y="170" fill="#ccc" font-size="9">UART (Teensy ↔ ESP32)</text>

  <line x1="875" y1="183" x2="910" y2="183" stroke="#40c040" stroke-width="1.5"/>
  <text x="918" y="187" fill="#ccc" font-size="9">Audio line out</text>

  <line x1="875" y1="200" x2="910" y2="200" stroke="#c050c0" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="918" y="204" fill="#ccc" font-size="9">Rim resistive signal</text>

  <line x1="875" y1="217" x2="910" y2="217" stroke="#e05050" stroke-width="1.5" stroke-dasharray="5,2"/>
  <text x="918" y="221" fill="#ccc" font-size="9">5V power</text>

  <line x1="875" y1="234" x2="910" y2="234" stroke="#e05050" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="918" y="238" fill="#ccc" font-size="9">3V3 power</text>

  <line x1="875" y1="251" x2="910" y2="251" stroke="#555" stroke-width="1.5"/>
  <text x="918" y="255" fill="#ccc" font-size="9">GND (common)</text>

  <!-- Version note -->
  <text x="550" y="800" text-anchor="middle" fill="#444" font-size="9">LED2 Teensy Project · wiring-diagram.svg · generated 2026-06-03</text>

</svg>
